<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Files</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }
    .box{
      background: white;
      padding: 25px;
      width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input{
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button{
      width: 100%;
      padding: 12px;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover{
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Upload Image, Audio, Video</h2>

    <form method="POST" enctype="multipart/form-data">
      <!-- Django: {% csrf_token %} -->

      <label>Upload Image</label>
      <input type="file" name="image" accept="image/*">

      <label>Upload Audio</label>
      <input type="file" name="audio" accept="audio/*">

      <label>Upload Video</label>
      <input type="file" name="video" accept="video/*">

      <button type="submit">Upload</button>
    </form>
  </div>

</body>
</html>
