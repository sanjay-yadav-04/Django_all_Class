<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload Form</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    .form-card{
      max-width: 650px;
      margin: 50px auto;
      padding: 25px;
      border-radius: 15px;
      background: white;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.08);
    }

    .form-title{
      font-size: 26px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      color: #222;
    }

    label{
      font-weight: 600;
      margin-bottom: 5px;
    }

    .btn-custom{
      width: 100%;
      font-size: 18px;
      padding: 10px;
      border-radius: 10px;
    }

    .form-control:focus{
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.2);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="form-card">

      <h2 class="form-title">Upload Details</h2>

      <!-- FORM -->
      <form action="{% url "data" %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <!-- Age -->
        <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="number" name="age" class="form-control" placeholder="Enter your age" min="1" max="100" required>
        </div>

        <!-- Image -->
        <div class="mb-3">
          <label class="form-label">Upload Image (jpg/png)</label>
          <input type="file" name="image" class="form-control" accept="image/*" required>
        </div>

        <!-- Video -->
        <div class="mb-3">
          <label class="form-label">Upload Video (mp4)</label>
          <input type="file" name="video" class="form-control" accept="video/*" required>
        </div>

        <!-- PDF -->
        <div class="mb-3">
          <label class="form-label">Upload PDF</label>
          <input type="file" name="pdf" class="form-control" accept="application/pdf" required>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-custom">
          Submit
        </button>

      </form>
      <!-- FORM END -->

    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
